services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-battleships}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-battleships}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-battleships}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-battleships}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-battleships}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CLIENT_URL: ${CLIENT_URL:?CLIENT_URL must be set}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    expose:
      - "3001"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${HOST_HTTP_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
