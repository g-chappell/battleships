<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 270" width="540" height="270">
  <rect width="540" height="270" fill="#150c0c"/>

  <!-- Title -->
  <text x="270" y="22" text-anchor="middle" fill="#d4a040" font-family="Georgia,serif" font-size="13" letter-spacing="3">TURN FLOW</text>

  <!-- Player Fires box -->
  <rect x="175" y="35" width="190" height="36" rx="6" fill="#3d1f1f" stroke="#8b0000" stroke-width="2"/>
  <text x="270" y="57" text-anchor="middle" fill="#e8dcc8" font-family="Georgia,serif" font-size="13">Player Fires</text>

  <!-- Arrow down to decision -->
  <line x1="270" y1="71" x2="270" y2="90" stroke="#8b0000" stroke-width="1.5"/>
  <polygon points="270,97 263,84 277,84" fill="#8b0000"/>

  <!-- Diamond: Hit? -->
  <polygon points="270,100 190,132 270,164 350,132" fill="#2a1a1a" stroke="#d4a040" stroke-width="1.5"/>
  <text x="270" y="137" text-anchor="middle" fill="#d4a040" font-family="Georgia,serif" font-size="12">Hit?</text>

  <!-- Left branch: MISS -->
  <line x1="190" y1="132" x2="128" y2="132" stroke="#4a6a8a" stroke-width="1.5"/>
  <polygon points="122,132 135,126 135,138" fill="#4a6a8a"/>
  <text x="155" y="123" text-anchor="middle" fill="#4a6a8a" font-family="Georgia,serif" font-size="10" font-style="italic">miss</text>
  <rect x="22" y="114" width="100" height="36" rx="5" fill="#1a1a2a" stroke="#4a6a8a" stroke-width="1.5"/>
  <text x="72" y="132" text-anchor="middle" fill="#7a9ab4" font-family="Georgia,serif" font-size="12">Opponent</text>
  <text x="72" y="146" text-anchor="middle" fill="#7a9ab4" font-family="Georgia,serif" font-size="12">Takes Turn</text>

  <!-- Right branch: HIT -->
  <line x1="350" y1="132" x2="412" y2="132" stroke="#c41e3a" stroke-width="1.5"/>
  <polygon points="418,132 405,126 405,138" fill="#c41e3a"/>
  <text x="381" y="123" text-anchor="middle" fill="#c41e3a" font-family="Georgia,serif" font-size="10" font-style="italic">hit!</text>

  <!-- Diamond: Ship Sunk? -->
  <polygon points="458,114 418,137 458,160 498,137" fill="#2a1a1a" stroke="#d4a040" stroke-width="1.5"/>
  <text x="458" y="141" text-anchor="middle" fill="#d4a040" font-family="Georgia,serif" font-size="11">Sunk?</text>

  <!-- Sunk YES: down -->
  <line x1="458" y1="160" x2="458" y2="177" stroke="#d4a040" stroke-width="1.5"/>
  <polygon points="458,184 451,171 465,171" fill="#d4a040"/>
  <text x="471" y="173" fill="#d4a040" font-family="Georgia,serif" font-size="10">yes</text>
  <rect x="400" y="184" width="116" height="38" rx="5" fill="#3d2a0a" stroke="#d4a040" stroke-width="1.5"/>
  <text x="458" y="202" text-anchor="middle" fill="#d4a040" font-family="Georgia,serif" font-size="12">Ship Sunk!</text>
  <text x="458" y="216" text-anchor="middle" fill="#d4a040" font-family="Georgia,serif" font-size="10">All sunk → Victory</text>

  <!-- Sunk NO: loop back to fire again -->
  <line x1="418" y1="137" x2="385" y2="137" stroke="#c41e3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="385" y1="137" x2="385" y2="53" stroke="#c41e3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="385" y1="53" x2="365" y2="53" stroke="#c41e3a" stroke-width="1.5"/>
  <polygon points="359,53 372,47 372,59" fill="#c41e3a"/>
  <text x="398" y="125" fill="#c41e3a" font-family="Georgia,serif" font-size="9" transform="rotate(90 390 95)">Fire Again</text>

  <!-- Opponent loop arrow -->
  <line x1="22" y1="132" x2="10" y2="132" stroke="#4a6a8a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="10" y1="132" x2="10" y2="53" stroke="#4a6a8a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="10" y1="53" x2="175" y2="53" stroke="#4a6a8a" stroke-width="1.5"/>
  <polygon points="181,53 168,47 168,59" fill="#4a6a8a"/>

  <!-- Bottom note -->
  <text x="270" y="252" text-anchor="middle" fill="#5a5a5a" font-family="Georgia,serif" font-size="9.5">Hits keep the turn · Misses switch the turn · All ships sunk = Victory</text>
</svg>
