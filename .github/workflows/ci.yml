name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: cd client && npx tsc --noEmit

      - name: Test shared
        run: npm run test --workspace=shared

      - name: Test server
        run: npm run test --workspace=server

      - name: Test client
        run: npm run test --workspace=client

      - name: Build client
        run: npm run build --workspace=client

  e2e:
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: battleships
          POSTGRES_PASSWORD: battleships
          POSTGRES_DB: battleships_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Push database schema
        run: cd server && npx prisma db push
        env:
          DATABASE_URL: postgresql://battleships:battleships@localhost:5432/battleships_e2e

      - name: Run e2e tests
        run: npm run test --workspace=e2e
        env:
          DATABASE_URL: postgresql://battleships:battleships@localhost:5432/battleships_e2e
          JWT_SECRET: e2e-test-secret
          CLIENT_URL: http://localhost:5173
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
